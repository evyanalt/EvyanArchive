<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SYSTEM_CRITICAL_970</title>
    <style>
        body { background: #000; margin: 0; overflow: hidden; height: 100vh; }
        #feedback-loop {
            width: 100%; height: 100%;
            filter: contrast(500%) brightness(200%) saturate(1000%);
            mix-blend-mode: exclusion;
            display: flex; align-items: center; justify-content: center;
        }
        .void-sphere {
            width: 300px; height: 300px;
            background: conic-gradient(red, yellow, lime, aqua, blue, magenta, red);
            border-radius: 50%;
            filter: blur(50px);
            animation: pulse 0.1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(5) rotate(180deg); filter: blur(0px); }
            100% { transform: scale(1) rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="feedback-loop">
        <div class="void-sphere"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
