<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>never too much</title>
    <style>
        body { 
            background: #050505; 
            color: #ff0055; 
            margin: 0; 
            overflow: hidden; 
            perspective: 1000px;
            font-family: 'Courier New', monospace;
        }
        #void {
            position: absolute;
            top: 50%; left: 50%;
            width: 10px; height: 10px;
            background: white;
            box-shadow: 0 0 100px 50px white, 0 0 200px 100px #ff00ff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 999;
        }
        .shard {
            position: absolute;
            padding: 10px;
            border: 1px solid;
            pointer-events: none;
            white-space: nowrap;
            transition: transform 0.1s linear;
        }
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-2px, -1px); }
            100% { transform: translate(1px, 1px); }
        }
        .shaking { animation: shake 0.1s infinite; }
    </style>
</head>
<body class="shaking">
    <div id="void"></div>
    <div id="canvas"></div>
    <script src="script.js"></script>
</body>
</html>
