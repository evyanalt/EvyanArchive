<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>⚠️ TOTAL_SYSTEM_DISRESPECT ⚠️</title>
    <style>
        body { background: #000; margin: 0; overflow: hidden; }
        #canvas-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; mix-blend-mode: exclusion; }
        #image-pit { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; display: flex; flex-wrap: wrap; }
        .spam-img { width: 50px; height: 50px; filter: hue-rotate(90deg) invert(1); animation: shake 0.05s infinite; }
        @keyframes shake {
            0% { transform: translate(0,0); }
            50% { transform: translate(10px, 10px) rotate(180deg); }
            100% { transform: translate(-10px, -10px); }
        }
    </style>
</head>
<body>
    <div id="image-pit"></div>
    <canvas id="canvas-layer"></canvas>
    <script src="script.js"></script>
</body>
</html>
