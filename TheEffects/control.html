<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chaos Control</title>

<style>
:root{
    --bg:#111;
    --panel:#1b1b1b;
    --border:#333;
    --text:#fff;
    --accent:#00ff88;
}

*{box-sizing:border-box;}

body{
    margin:0;
    padding:20px;
    background:var(--bg);
    color:var(--text);
    font-family:Arial,sans-serif;
}

.panel{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:12px;
    padding:16px;
    margin-bottom:16px;
}

h1{margin-top:0;}

button,select{
    width:100%;
    margin-top:8px;
    padding:10px;
    border-radius:8px;
    border:1px solid var(--border);
    background:#222;
    color:white;
}

button:hover{cursor:pointer;background:#2b2b2b;}

.row{
    display:flex;
    gap:10px;
}

.row button{flex:1;}

#currentMode{
    font-weight:bold;
    color:var(--accent);
}

/* PAD GRID */
.pad-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(110px,1fr));
    gap:10px;
    margin-top:10px;
}

.pad{
    position:relative;
    padding:12px 10px;
    border-radius:10px;
    background:#222;
    border:1px solid #333;
    text-align:center;
    cursor:pointer;
    user-select:none;
    transition:.15s;
    font-size:13px;
}

.pad:hover{
    transform:scale(1.05);
    border-color:var(--accent);
}

.pad.active{
    border-color:var(--accent);
    box-shadow:0 0 10px rgba(0,255,136,0.2);
}

.star{
    position:absolute;
    top:6px;
    right:8px;
    font-size:12px;
    opacity:0.3;
    cursor:pointer;
}

.pad.fav .star{
    opacity:1;
}
</style>
</head>

<body>

<div class="panel">
    <h1>Chaos Control</h1>
    Current Mode: <span id="currentMode">None</span>
</div>

<div class="panel">
    <h3>Favorites</h3>
    <div id="favRow" class="row"></div>
</div>

<div class="panel">
    <h3>Effect Pads</h3>
    <div id="padGrid" class="pad-grid"></div>
</div>

<div class="panel">

    <h3>Manual Select</h3>

    <select id="modeSelect"></select>

    <button onclick="applySelected()">Apply</button>

    <div class="row" style="margin-top:10px;">
        <button onclick="randomMode()">Random</button>
        <button onclick="toggleAutoplay()" id="autoBtn">Autoplay OFF</button>
    </div>

</div>
<div class="panel">
    <h3>Other</h3>
    <button onclick="window.location.href='oldcontrol.html';">Go to Old Control Panel</button>
    <p>Use this control panel if the new one doesn't work.</p>

<script>

const channel = new BroadcastChannel("chaos");

let currentMode = null;

/* ---------------- MODES ---------------- */

const modes = [
"organism","swarm","bionet","cells","recursive","fracture","vhs","vhs1",
"ascii","storm","glitch","matrix","maze","terminal","xp","grid","stars",
"crystal","webmind","tendrils","dreamai","ants","warp","watchers","forest",
"dna","aquarium","echoes","fireflies","orbital bloom","resonance",
"wanderers","flux field","halo system","loading","collapse","bloom",
"lightning","runes","mirror","bios","nebula","lost","crt","dvd",
"wallpaper","rainforest","blacksun","scanner","garden","fossils","leak",
"archive","ghosts","internetweather","artificialweather","dream",
"matrixrain","deepstars","superswarm","crystalgrowth","glitchterminal",
"warptunnel","neurons","lenia"
];

/* ---------------- STATE ---------------- */

let favorites = JSON.parse(localStorage.getItem("favModes") || "[]");

/* ---------------- CORE ---------------- */

function setMode(mode){
    currentMode = mode;
    document.getElementById("currentMode").textContent = mode;
    channel.postMessage({ mode });
}

function applySelected(){
    setMode(document.getElementById("modeSelect").value);
}

/* ---------------- PAD SYSTEM ---------------- */

function renderPads(){

    const grid = document.getElementById("padGrid");
    grid.innerHTML = "";

    modes.forEach(m => {

        const pad = document.createElement("div");
        pad.className = "pad" + (favorites.includes(m) ? " fav" : "");

        pad.innerHTML = `
            ${m}
            <div class="star">★</div>
        `;

        pad.onclick = () => setMode(m);

        pad.querySelector(".star").onclick = (e) => {
            e.stopPropagation();
            toggleFav(m);
        };

        grid.appendChild(pad);
    });

    renderFavRow();
}

function toggleFav(mode){

    if(favorites.includes(mode)){
        favorites = favorites.filter(f => f !== mode);
    } else {
        favorites.push(mode);
    }

    localStorage.setItem("favModes", JSON.stringify(favorites));
    renderPads();
}

function renderFavRow(){

    const row = document.getElementById("favRow");
    row.innerHTML = "";

    favorites.forEach(m => {

        const b = document.createElement("button");
        b.textContent = m;
        b.onclick = () => setMode(m);
        row.appendChild(b);

    });

}

/* ---------------- SELECT ---------------- */

function buildSelect(){

    const sel = document.getElementById("modeSelect");

    modes.forEach(m => {
        const opt = document.createElement("option");
        opt.value = m;
        opt.textContent = m;
        sel.appendChild(opt);
    });

}

/* ---------------- RANDOM ---------------- */

function randomMode(){
    setMode(modes[Math.floor(Math.random()*modes.length)]);
}

/* ---------------- AUTOPLAY ---------------- */

let autoplay = false;
let timer = null;

function toggleAutoplay(){

    autoplay = !autoplay;

    const btn = document.getElementById("autoBtn");

    if(autoplay){
        btn.textContent = "Autoplay ON";
        timer = setInterval(randomMode, 30000);
    } else {
        btn.textContent = "Autoplay OFF";
        clearInterval(timer);
    }
}

/* ---------------- INIT ---------------- */

buildSelect();
renderPads();
randomMode();

</script>

</body>
</html>
