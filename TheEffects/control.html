<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chaos Control</title>

<style>
:root{
    --bg:#080b12;
    --panel:#101826;
    --panel2:#162133;
    --border:#2a3954;
    --text:#e8f1ff;
    --accent:#6da8ff;
    --accent2:#7bffcf;
}

body{
    margin:0;
    padding:24px;
    background:
        radial-gradient(circle at top,
        #182642 0%,
        #0d1320 40%,
        #05070d 100%);
    color:var(--text);
    font-family:Inter,Segoe UI,sans-serif;
}

.panel{
    background:rgba(16,24,38,.85);
    backdrop-filter:blur(12px);
    border:1px solid var(--border);
    border-radius:18px;
    padding:18px;
    margin-bottom:18px;

    box-shadow:
        0 0 40px rgba(0,0,0,.35),
        inset 0 0 20px rgba(255,255,255,.02);
}

h1{
    margin-top:0;
    font-size:2rem;
    letter-spacing:.05em;
}

button,
select{
    width:100%;
    padding:12px;
    margin-top:8px;

    background:linear-gradient(
        180deg,
        var(--panel2),
        var(--panel)
    );

    border:1px solid var(--border);
    border-radius:12px;

    color:white;
    font-size:.95rem;

    transition:.2s;
}

button:hover,
select:hover{
    transform:translateY(-2px);

    border-color:var(--accent);

    box-shadow:
        0 0 15px rgba(109,168,255,.25);
}

button:active{
    transform:translateY(1px);
}

#currentMode{
    color:var(--accent2);
    font-weight:bold;
}
.statusline{
    margin-top:12px;
    color:#7bffcf;
    font-size:.85rem;
}

.dot{
    display:inline-block;
    width:8px;
    height:8px;
    border-radius:50%;
    background:#7bffcf;
    margin-right:8px;

    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%,100%{
        opacity:.3;
    }
    50%{
        opacity:1;
        box-shadow:0 0 10px #7bffcf;
    }
}
</style>
</head>
<body>

<div class="panel">
    <h1>Chaos Control</h1>
    <div class="statusline">
    <span class="dot"></span>
    CHAOS LINK ACTIVE
</div>
    Current Mode:
    <span id="currentMode">None</span>
</div>

<div class="panel">
    <h3>Favorites</h3>

    <button onclick="setMode('organism')">
        Organism
    </button>

    <button onclick="setMode('swarm')">
        Swarm
    </button>

    <button onclick="setMode('bionet')">
        Bio Net
    </button>

    <button onclick="setMode('cells')">
        Void Cells
    </button>
</div>

<div class="panel">

    <h3>All Modes</h3>

    <select id="modeSelect">

        <option value="organism">
            Organism
        </option>

        <option value="swarm">
            Swarm
        </option>

        <option value="bionet">
            Bio Net
        </option>

        <option value="cells">
            Void Cells
        </option>

        <option value="recursive">
            Recursive
        </option>

        <option value="fracture">
            Fracture
        </option>

        <option value="vhs">
            VHS
        </option>

        <option value="vhs1">
            VHS 1
        </option>

        <option value="ascii">
            ASCII
        </option>

        <option value="storm">
            Storm
        </option>

        <option value="glitch">
            Glitch
        </option>
        <option value="matrix">
            Matrix
        </option>
        <option value="maze">
            Maze
        </option>
        <option value="terminal">
            Terminal
        </option>
        <option value="xp">
            XP
        </option>
        <option value="grid">
            Grid
        </option>
        <option value="stars">
            Stars
        </option>
        <option value="crystal">
            Crystal
        </option>
        <option value="webmind">
            Web Mind
        </option>
        <option value="tendrils">
            Tendrils
        </option>
        <option value="dreamai">
            Dream AI
        </option>
        <option value="ants">
            Ants
        </option>
        <option value="warp">
            Warp
        </option>
        <option value="watchers">
            Watchers
        </option>
        <option value="forest">
            Forest
        </option>
        <option value="dna">
            DNA
        </option>
        <option value="aquarium">
            Aquarium
        </option>
        <option value="echoes">
            Echoes
        </option>
        <option value="Fireflies">
            Fireflies
        </option>
        <option value="Orbital Bloom">
            Orbital Bloom
        </option>
        <option value="Resonance">
            Resonance
        </option>
        <option value="Wanderers">
            Wanderers
        </option>
        <option value="Flux Field">
            Flux Field
        </option>
        <option value="Halo System">
            Halo System
        </option>
        <option value="loading">
            Loading
        </option>
        <option value="collapse">
            Collapse
        </option>
        <option value="bloom">
            Bloom
        </option>
        <option value="lightning">
            Lightning
        </option>
        <option value="runes">
            Runes
        </option>
        <option value="mirror">
            Mirror
        </option>
        <option value="bios">
            BIOS
        </option>
        <option value="nebula">
            Nebula
        </option>
        <option value="lost">
            Lost
        </option>
        <option value="crt">
            CRT
        </option>
        <option value="dvd">
            DVD
        </option>
        <option value="wallpaper">
            Wallpaper
        </option>
        <option value="rainforest">
            Rainforest
        </option>
        <option value="blacksun">
            Black Sun
        </option>
        <option value="scanner">
            Scanner
        </option>
        <option value="garden">
            Garden
        </option>
        <option value="fossils">
            Fossils
        </option>
        <option value="leak">
            Leak
        </option>
        <option value="archive">
            Archive
        </option>
        <option value="ghosts">
            Ghosts
        </option>
        <option value="internetweather">
            Internet Weather
        </option>
        <option value="artificialweather">
            Artificial Weather
        </option>
        <option value="dream">
            Dream
        </option>
        <option value="matrixrain">Matrix Rain</option>
        <option value="deepstars">Deep Stars</option>
<option value="superswarm">Super Swarm</option>
<option value="crystalgrowth">Crystal Growth</option>
<option value="glitchterminal">Glitch Terminal</option>
<option value="warptunnel">Warp Tunnel</option>
<option value="neurons">Neurons</option>
<option value="lenia">Lenia</option>
    </select>

    <button onclick="applySelected()">
        Apply
    </button>

</div>

<div class="panel">

    <div class="row">

        <button onclick="randomMode()">
            Random
        </button>

        <button onclick="toggleAutoplay()"
                id="autoBtn">
            Autoplay OFF
        </button>

    </div>

</div>
<script>

const channel =
    new BroadcastChannel("chaos");

let currentMode = null;

function setMode(mode){

    currentMode = mode;

    document.getElementById(
        "currentMode"
    ).textContent = mode;

    channel.postMessage({
        mode
    });

}

function applySelected(){

    const mode =
    document.getElementById(
        "modeSelect"
    ).value;

    setMode(mode);

}

const modes = [

    "organism",
    "swarm",
    "bionet",
    "cells",
    "recursive",
    "fracture",
    "vhs",
    "ascii",
    "storm",
    "glitch",
    "matrix",
    "maze",
    "terminal",
    "xp",
    "grid",
    "stars",
    "crystal",
    "webmind",
    "tendrils",
    "dreamai",
    "ants",
    "warp",
    "watchers",
    "forest",
    "dna",
    "aquarium",
    "echoes",
    "fireflies",
    "orbital bloom",
    "resonance",
    "wanderers",
    "flux field",
    "halo system",
    "loading",
    "collapse",
    "bloom",
    "lightning",
    "runes",
    "mirror",
    "bios",
    "nebula",
    "lost",
    "crt",
    "dvd",
    "wallpaper",
    "rainforest",
    "blacksun",
    "scanner",
    "garden",
    "fossils",
    "leak",
    "archive",
    "ghosts",
    "internetweather",
    "artificialweather",
    "dream",
    "matrixrain",
    "deepstars",
    "superswarm",
    "crystalgrowth",
    "glitchterminal",
    "warptunnel",
    "neurons",
    "lenia",

];

function randomMode(){

    const mode =
    modes[
        Math.floor(
            Math.random() *
            modes.length
        )
    ];

    setMode(mode);

}

let autoplay = false;
let autoplayTimer = null;

function toggleAutoplay(){

    autoplay = !autoplay;

    const btn =
    document.getElementById(
        "autoBtn"
    );

    if(autoplay){

        btn.textContent =
            "Autoplay ON";

        autoplayTimer =
        setInterval(
            randomMode,
            30000
        );

    }else{

        btn.textContent =
            "Autoplay OFF";

        clearInterval(
            autoplayTimer
        );

    }

}

randomMode();

</script>

</body>
</html>
