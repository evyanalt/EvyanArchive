<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chroma Core Generator</title>
    <style>
        body {
            margin: 0;
            background: #00020a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 600px;
            height: 600px;
            /* This filter creates the "liquid circuit" look */
            filter: blur(4px) contrast(15) brightness(1.2);
            background: radial-gradient(circle, #fff 0%, #1e40af 40%, #000 70%);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        /* The Glow Overlay */
        .glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, transparent 60%);
            pointer-events: none;
            mix-blend-mode: screen;
            filter: blur(20px);
        }
    </style>
</head>
<body>

    <div class="container">
        <canvas id="circuitCanvas"></canvas>
        <div class="glow"></div>
    </div>

    <script>
        const canvas = document.getElementById('circuitCanvas');
        const ctx = canvas.getContext('2d');
        const size = 600;
        canvas.width = size;
        canvas.height = size;

        function drawAbstractPattern() {
            ctx.clearRect(0, 0, size, size);
            
            // Set style for the "circuit" paths
            ctx.strokeStyle = '#002266'; // Deep blue
            ctx.lineWidth = 12;
            ctx.lineCap = 'round';

            const center = size / 2;
            const grid = 25;

            // Generate random grid-based lines
            for (let x = 0; x < size; x += grid) {
                for (let y = 0; y < size; y += grid) {
                    
                    const dist = Math.hypot(x - center, y - center);
                    
                    // Only draw within a certain radius to mimic the sphere shape
                    if (dist < 260 && Math.random() > 0.4) {
                        ctx.beginPath();
                        ctx.moveTo(x, y);
                        
                        // Create 90-degree "circuit" turns
                        if (Math.random() > 0.5) {
                            ctx.lineTo(x + grid, y);
                        } else {
                            ctx.lineTo(x, y + grid);
                        }
                        
                        // Occasional "dots" or nodes
                        if (Math.random() > 0.9) {
                            ctx.arc(x, y, 4, 0, Math.PI * 2);
                        }
                        
                        ctx.stroke();
                    }
                }
            }

            // Add some "rays" radiating from center
            ctx.lineWidth = 4;
            for(let i = 0; i < 36; i++) {
                const angle = (i * 10) * Math.PI / 180;
                ctx.beginPath();
                ctx.moveTo(center + Math.cos(angle) * 100, center + Math.sin(angle) * 100);
                ctx.lineTo(center + Math.cos(angle) * 350, center + Math.sin(angle) * 350);
                ctx.stroke();
            }
        }

        drawAbstractPattern();

        // Optional: click to regenerate a new pattern
        window.addEventListener('click', drawAbstractPattern);
    </script>
</body>
</html>
