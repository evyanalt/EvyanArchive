<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The ASCII Factory</title>
    <style>
        :root {
            --metal: #718096;
            --laser: #ff003c;
            --screen: #00ff41;
            --bg: #1a202c;
        }

        body {
            background-color: var(--bg);
            color: var(--metal);
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #factory-floor {
            background: #000;
            padding: 20px;
            border: 4px double var(--metal);
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .conveyor {
            white-space: pre;
            line-height: 1;
            font-size: 14px;
            color: var(--screen);
        }

        .machine {
            color: #fff;
            font-weight: bold;
            text-shadow: 0 0 5px #fff;
        }

        .laser-line {
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            height: 100%;
            background: var(--laser);
            box-shadow: 0 0 10px var(--laser);
            z-index: 5;
            animation: scan 2s infinite ease-in-out;
        }

        @keyframes scan {
            0%, 100% { transform: translateX(-20px); opacity: 0.5; }
            50% { transform: translateX(20px); opacity: 1; }
        }

        #stats {
            margin-top: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 400px;
            font-size: 12px;
            text-transform: uppercase;
        }

        .lcd {
            border: 1px solid var(--screen);
            padding: 10px;
            color: var(--screen);
        }

        .warning { color: var(--laser); animation: blink 0.5s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div id="factory-floor">
    <div class="laser-line"></div>
    <div id="display" class="conveyor"></div>
</div>

<div id="stats">
    <div class="lcd">
        OUTPUT RATE: <span id="rate">0</span> units/sec<br>
        STATUS: <span id="status">OPERATIONAL</span>
    </div>
    <div class="lcd">
        MATH KERNEL: <span id="kernel">LINEAR_GEN</span><br>
        <span class="warning">HEAT LEVEL: NORMAL</span>
    </div>
</div>

<script>
    const display = document.getElementById('display');
    const width = 60;
    const height = 20;
    
    // The "Parts" being manufactured
    const bluePrints = [
        [" [ ] ", "[=]", " [ ] "],
        ["  /\\  ", " /  \\ ", "/____\\"],
        [" (o o)", "  \\-/ ", "  _|_ "],
        [" @@@ ", " @ @ ", " @@@ "]
    ];

    let conveyorBelt = Array(height).fill(0).map(() => Array(width).fill(" "));
    let frame = 0;

    function updateFactory() {
        frame++;

        // 1. Shift everything to the left (The Belt Moves)
        for (let y = 0; y < height; y++) {
            conveyorBelt[y].shift();
            conveyorBelt[y].push(" ");
        }

        // 2. Input Stage (Left Side) - Random raw noise
        if (frame % 2 === 0) {
            let ry = Math.floor(Math.random() * height);
            conveyorBelt[ry][width - 1] = "·";
        }

        // 3. Assembly Stage (Center)
        // If a "·" hits the center laser, it has a chance to expand into a blueprint
        if (frame % 15 === 0) {
            const blueprint = bluePrints[Math.floor(Math.random() * bluePrints.length)];
            const startY = Math.floor(Math.random() * (height - 4)) + 1;
            
            for(let i=0; i<blueprint.length; i++) {
                for(let j=0; j<blueprint[i].length; j++) {
                    if (startY + i < height) {
                        conveyorBelt[startY + i][width - 1 - j] = blueprint[i][j];
                    }
                }
            }
        }

        render();
    }

    function render() {
        let output = "";
        // Add the top of the machine frame
        output += "╔" + "═".repeat(width) + "╗\n";
        
        for (let y = 0; y < height; y++) {
            let rowText = conveyorBelt[y].join("");
            
            // Highlight the "Laser" processing zone in the middle
            let left = rowText.substring(0, width/2 - 2);
            let mid = rowText.substring(width/2 - 2, width/2 + 2);
            let right = rowText.substring(width/2 + 2);
            
            output += "║" + left + "<span class='machine'>" + mid + "</span>" + right + "║\n";
        }
        
        output += "╚" + "═".repeat(width) + "╝";
        display.innerHTML = output;
        
        document.getElementById('rate').innerText = (Math.random() * 5 + 20).toFixed(1);
    }

    setInterval(updateFactory, 50);
</script>
</body>
</html>
