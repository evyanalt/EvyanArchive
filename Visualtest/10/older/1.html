<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Visuals Showcase</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: radial-gradient(circle at top, #1d1f3a, #090b15 70%);
      font-family: Arial, sans-serif;
      color: white;
      height: 100vh;
    }

    canvas {
      position: absolute;
      inset: 0;
    }

    .overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
      z-index: 10;
    }

    h1 {
      font-size: 4rem;
      letter-spacing: 0.3rem;
      text-transform: uppercase;
      background: linear-gradient(90deg, #7cf, #f7a, #9f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: glow 4s ease-in-out infinite alternate;
    }

    p {
      margin-top: 1rem;
      opacity: 0.75;
      font-size: 1rem;
      letter-spacing: 0.1rem;
    }

    @keyframes glow {
      from {
        filter: drop-shadow(0 0 10px rgba(100, 200, 255, 0.4));
      }
      to {
        filter: drop-shadow(0 0 30px rgba(255, 100, 200, 0.8));
      }
    }

    .controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 20;
    }

    button {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 10px 16px;
      border-radius: 999px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: 0.2s ease;
    }

    button:hover {
      background: rgba(255,255,255,0.18);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>

  <div class="overlay">
    <h1>Dream Engine</h1>
    <p>Move your mouse and click to create energy bursts</p>
  </div>

  <div class="controls">
    <button onclick="setMode('galaxy')">Galaxy</button>
    <button onclick="setMode('matrix')">Matrix</button>
    <button onclick="setMode('waves')">Waves</button>
  </div>

  <script>
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');

    let w = canvas.width = window.innerWidth;
    let h = canvas.height = window.innerHeight;

    window.addEventListener('resize', () => {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
      initGalaxy();
    });

    let mouse = {
      x: w / 2,
      y: h / 2
    };

    window.addEventListener('mousemove', e => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    let mode = 'galaxy';

    function setMode(m) {
      mode = m;
    }

    // ---------------- GALAXY ----------------

    let particles = [];

    function initGalaxy() {
      particles = [];
      for (let i = 0; i < 250; i++) {
        particles.push({
          angle: Math.random() * Math.PI * 2,
          radius: Math.random() * 300,
          speed: (Math.random() - 0.5) * 0.01,
          size: Math.random() * 3 + 1,
          hue: Math.random() * 360
        });
      }
    }

    initGalaxy();

    function drawGalaxy() {
      ctx.fillStyle = 'rgba(5, 5, 15, 0.15)';
      ctx.fillRect(0, 0, w, h);

      particles.forEach(p => {
        p.angle += p.speed;

        const x = mouse.x + Math.cos(p.angle) * p.radius;
        const y = mouse.y + Math.sin(p.angle) * p.radius;

        ctx.beginPath();
        ctx.fillStyle = `hsl(${p.hue}, 100%, 70%)`;
        ctx.arc(x, y, p.size, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    // ---------------- MATRIX ----------------

    const letters = '01アカサタナハマヤラワABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const fontSize = 18;
    let columns = Math.floor(w / fontSize);
    let drops = Array(columns).fill(1);

    function resetMatrix() {
      columns = Math.floor(w / fontSize);
      drops = Array(columns).fill(1);
    }

    function drawMatrix() {
      ctx.fillStyle = 'rgba(0,0,0,0.08)';
      ctx.fillRect(0, 0, w, h);

      ctx.fillStyle = '#00ff88';
      ctx.font = fontSize + 'px monospace';

      for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > h && Math.random() > 0.975) {
          drops[i] = 0;
        }

        drops[i]++;
      }
    }

    // ---------------- WAVES ----------------

    let time = 0;

    function drawWaves() {
      ctx.fillStyle = 'rgba(10,10,25,0.12)';
      ctx.fillRect(0, 0, w, h);

      for (let j = 0; j < 6; j++) {
        ctx.beginPath();

        for (let x = 0; x < w; x++) {
          const y = h / 2 +
            Math.sin(x * 0.01 + time + j) * (40 + j * 10) +
            Math.sin(x * 0.02 + time * 1.5) * 20;

          ctx.lineTo(x, y + j * 25 - 70);
        }

        ctx.strokeStyle = `hsla(${180 + j * 25}, 100%, 70%, 0.6)`;
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      time += 0.02;
    }

    // ---------------- BURSTS ----------------

    let bursts = [];

    window.addEventListener('click', e => {
      for (let i = 0; i < 50; i++) {
        bursts.push({
          x: e.clientX,
          y: e.clientY,
          dx: (Math.random() - 0.5) * 8,
          dy: (Math.random() - 0.5) * 8,
          life: 100,
          hue: Math.random() * 360
        });
      }
    });

    function drawBursts() {
      bursts.forEach((b, index) => {
        b.x += b.dx;
        b.y += b.dy;
        b.life--;

        ctx.fillStyle = `hsla(${b.hue},100%,70%,${b.life / 100})`;
        ctx.beginPath();
        ctx.arc(b.x, b.y, 2, 0, Math.PI * 2);
        ctx.fill();

        if (b.life <= 0) {
          bursts.splice(index, 1);
        }
      });
    }

    // ---------------- LOOP ----------------

    function animate() {
      requestAnimationFrame(animate);

      switch (mode) {
        case 'galaxy':
          drawGalaxy();
          break;
        case 'matrix':
          drawMatrix();
          break;
        case 'waves':
          drawWaves();
          break;
      }

      drawBursts();
    }

    animate();
  </script>
</body>
</html>
