<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Visuals Showcase</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: radial-gradient(circle at top, #1d1f3a, #090b15 70%);
      font-family: Arial, sans-serif;
      color: white;
      height: 100vh;
    }

    canvas {
      position: absolute;
      inset: 0;
    }

    .overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
      z-index: 10;
    }

    h1 {
      font-size: 4rem;
      letter-spacing: 0.3rem;
      text-transform: uppercase;
      background: linear-gradient(90deg, #7cf, #f7a, #9f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: glow 4s ease-in-out infinite alternate;
    }

    p {
      margin-top: 1rem;
      opacity: 0.75;
      font-size: 1rem;
      letter-spacing: 0.1rem;
    }

    @keyframes glow {
      from {
        filter: drop-shadow(0 0 10px rgba(100, 200, 255, 0.4));
      }
      to {
        filter: drop-shadow(0 0 30px rgba(255, 100, 200, 0.8));
      }
    }

    .controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 20;
    }

    button {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 10px 16px;
      border-radius: 999px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: 0.2s ease;
    }

    button:hover {
      background: rgba(255,255,255,0.18);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>

  <div class="overlay">
    <h1>Dream Engine</h1>
    <p>Move your mouse and click to create energy bursts</p>
  </div>

  <div class="controls">
    <button onclick="setMode('galaxy')">Galaxy</button>
    <button onclick="setMode('matrix')">Matrix</button>
    <button onclick="setMode('waves')">Waves</button>
  </div>

  <script>
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');

    let w = canvas.width = window.innerWidth;
    let h = canvas.height = window.innerHeight;

    window.addEventListener('resize', () => {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
      initGalaxy();
    });

    let mouse = {
      x: w / 2,
      y: h / 2
    };

    window.addEventListener('mousemove', e => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    let mode = 'galaxy';

    function setMode(m) {
      mode = m;
    }

    // ---------------- GALAXY ----------------

    let particles = [];

    function initGalaxy() {
      particles = [];
      for (let i = 0; i < 250; i++) {
        particles.push({
          angle: Math.random() * Math.PI * 2,
          radius: Math.random() * 300,
          speed: (Math.random() - 0.5) * 0.01,
          size: Math.random() * 3 + 1,
          hue: Math.random() * 360
        });
      }
    }

    initGalaxy();

    function drawGalaxy() {
      ctx.fillStyle = 'rgba(5, 5, 15, 0.15)';
      ctx.fillRect(0, 0, w, h);

      particles.forEach(p => {
        p.angle += p.speed;

        const x = mouse.x + Math.cos(p.angle) * p.radius;
        const y = mouse.y + Math.sin(p.angle) * p.radius;

        ctx.beginPath();
        ctx.fillStyle = `hsl(${p.hue}, 100%, 70%)`;
        ctx.arc(x, y, p.size, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    // ---------------- MATRIX ----------------

    const letters = '01アカサタナハマヤラワABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const fontSize = 18;
    let columns = Math.floor(w / fontSize);
    let drops = Array(columns).fill(1);

    function resetMatrix() {
      columns = Math.floor(w / fontSize);
      drops = Array(columns).fill(1);
    }

    function drawMatrix() {
      ctx.fillStyle = 'rgba(0,0,0,0.08)';
      ctx.fillRect(0, 0, w, h);

      ctx.fillStyle = '#00ff88';
      ctx.font = fontSize + 'px monospace';

      for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > h && Math.random() > 0.975) {
          drops[i] = 0;
        }

        drops[i]++;
      }
    }

    // ---------------- WAVES ----------------

    let time = 0;

    function drawWaves() {
      ctx.fillStyle = 'rgba(10,10,25,0.12)';
      ctx.fillRect(0, 0, w, h);

      for (let j = 0; j < 6; j++) {
        ctx.beginPath();

        for (let x = 0; x < w; x++) {
          const y = h / 2 +
            Math.sin(x * 0.01 + time + j) * (40 + j * 10) +
            Math.sin(x * 0.02 + time * 1.5) * 20;

          ctx.lineTo(x, y + j * 25 - 70);
        }

        ctx.strokeStyle = `hsla(${180 + j * 25}, 100%, 70%, 0.6)`;
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      time += 0.02;
    }

    // ---------------- BURSTS ----------------

    let bursts = [];

    window.addEventListener('click', e => {
      for (let i = 0; i < 50; i++) {
        bursts.push({
          x: e.clientX,
          y: e.clientY,
          dx: (Math.random() - 0.5) * 8,
          dy: (Math.random() - 0.5) * 8,
          life: 100,
          hue: Math.random() * 360
        });
      }
    });

    function drawBursts() {
      bursts.forEach((b, index) => {
        b.x += b.dx;
        b.y += b.dy;
        b.life--;

        ctx.fillStyle = `hsla(${b.hue},100%,70%,${b.life / 100})`;
        ctx.beginPath();
        ctx.arc(b.x, b.y, 2, 0, Math.PI * 2);
        ctx.fill();

        if (b.life <= 0) {
          bursts.splice(index, 1);
        }
      });
    }

    // ---------------- LOOP ----------------

    function animate() {
      requestAnimationFrame(animate);

      switch (mode) {
        case 'galaxy':
          drawGalaxy();
          break;
        case 'matrix':
          drawMatrix();
          break;
        case 'waves':
          drawWaves();
          break;
      }

      drawBursts();
    }

    animate();
  </script>
  <script>
    // Extra visual modes

    // ---------------- FIRE ----------------
    function drawFire() {
      ctx.fillStyle = 'rgba(0,0,0,0.08)';
      ctx.fillRect(0,0,w,h);

      for (let i = 0; i < 120; i++) {
        const x = Math.random() * w;
        const y = h + Math.random() * 120;
        const size = Math.random() * 40;

        const gradient = ctx.createRadialGradient(x, y, 0, x, y, size);
        gradient.addColorStop(0, 'rgba(255,255,180,0.9)');
        gradient.addColorStop(0.3, 'rgba(255,120,0,0.7)');
        gradient.addColorStop(1, 'rgba(255,0,0,0)');

        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(x, y - Math.random() * 250, size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // ---------------- TUNNEL ----------------
    let tunnelTime = 0;

    function drawTunnel() {
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.fillRect(0,0,w,h);

      for (let i = 0; i < 100; i++) {
        const radius = (i * 12 + tunnelTime) % 1200;

        ctx.beginPath();
        ctx.arc(w/2, h/2, radius, 0, Math.PI * 2);
        ctx.strokeStyle = `hsla(${radius/4},100%,70%,0.6)`;
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      tunnelTime += 4;
    }

    // ---------------- GRID ----------------
    let gridOffset = 0;

    function drawGrid() {
      ctx.fillStyle = '#050510';
      ctx.fillRect(0,0,w,h);

      ctx.strokeStyle = 'rgba(0,255,255,0.3)';

      for (let y = 0; y < h; y += 25) {
        ctx.beginPath();
        for (let x = 0; x < w; x += 10) {
          const wave = Math.sin((x + gridOffset) * 0.02 + y * 0.01) * 15;
          ctx.lineTo(x, y + wave);
        }
        ctx.stroke();
      }

      gridOffset += 2;
    }

    // ---------------- STARS ----------------
    const stars = Array.from({ length: 400 }, () => ({
      x: Math.random() * w - w/2,
      y: Math.random() * h - h/2,
      z: Math.random() * w
    }));

    function drawStars() {
      ctx.fillStyle = 'rgba(0,0,10,0.35)';
      ctx.fillRect(0,0,w,h);

      stars.forEach(s => {
        s.z -= 6;
        if (s.z <= 0) s.z = w;

        const sx = (s.x / s.z) * w + w/2;
        const sy = (s.y / s.z) * h + h/2;
        const size = (1 - s.z / w) * 5;

        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(sx, sy, size, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    // ---------------- FRACTAL DOTS ----------------
    let angleShift = 0;

    function drawFractal() {
      ctx.fillStyle = 'rgba(0,0,0,0.08)';
      ctx.fillRect(0,0,w,h);

      for (let i = 0; i < 1200; i++) {
        const angle = i * 0.15 + angleShift;
        const radius = i * 0.25;

        const x = w/2 + Math.cos(angle) * radius;
        const y = h/2 + Math.sin(angle) * radius;

        ctx.fillStyle = `hsl(${i/3},100%,70%)`;
        ctx.fillRect(x, y, 2, 2);
      }

      angleShift += 0.01;
    }

    // Add buttons dynamically
    const controls = document.querySelector('.controls');

    [
      ['Fire', 'fire'],
      ['Tunnel', 'tunnel'],
      ['Grid', 'grid'],
      ['Stars', 'stars'],
      ['Fractal', 'fractal']
    ].forEach(([label, value]) => {
      const btn = document.createElement('button');
      btn.textContent = label;
      btn.onclick = () => setMode(value);
      controls.appendChild(btn);
    });

    // Extend animation switch
    const oldAnimate = animate;

    animate = function () {
      requestAnimationFrame(animate);

      switch (mode) {
        case 'galaxy':
          drawGalaxy();
          break;
        case 'matrix':
          drawMatrix();
          break;
        case 'waves':
          drawWaves();
          break;
        case 'fire':
          drawFire();
          break;
        case 'tunnel':
          drawTunnel();
          break;
        case 'grid':
          drawGrid();
          break;
        case 'stars':
          drawStars();
          break;
        case 'fractal':
          drawFractal();
          break;
      }

      drawBursts();
    }

    animate();
  </script>
</body>
</html>
